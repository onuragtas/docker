name: Docker Image Apache2

on:
  push:
    branches: [ "master" ]
    paths:
      - 'httpd/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'httpd/**'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      -
        uses: actions/checkout@v3
        name: Checkout
      -
        name: ls -la
        run: ls -la
      -
        uses: docker/login-action@v2
        name: Login to Docker Hub
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        uses: docker/setup-buildx-action@v2 
        name: Setup buildx
      -
        name: Build the apache2
        run: docker buildx build --platform linux/amd64,linux/arm64 -t onuragtas/apache2:latest --push ./httpd/.
